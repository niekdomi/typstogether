name: CI

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    name: Spellcheck
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: codebook-lsp
      - run: codebook-lsp lint .

  build:
    runs-on: ubuntu-latest
    name: Build
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - run: echo "build job not yet enabled"
      # - uses: actions/checkout@v6
      # - uses: oven-sh/setup-bun@v2

      # - name: Install dependencies
      #   run: bun install --frozen-lockfile

      # - name: Build
      #   run: bun run build

  lint:
    runs-on: ubuntu-latest
    name: Lint
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & Formatting check
        run: bun run lint

      - name: Type check
        run: bun run check

  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        working-directory: backend
        run: bun test --coverage 2>&1 | tee ../coverage.txt

      - name: Generate coverage markdown
        run: python3 .github/scripts/coverage_report.py coverage.txt code-coverage-results.md

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          path: code-coverage-results.md
