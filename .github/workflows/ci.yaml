name: CI

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    name: Spellcheck
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: codebook-lsp
      - run: codebook-lsp lint .

  build:
    runs-on: ubuntu-latest
    name: Build
    timeout-minutes: 5
    permissions:
      contents: read

    # steps:
    #   - uses: actions/checkout@v6
    #   - uses: oven-sh/setup-bun@v2

    #   - name: Install dependencies
    #     run: bun install --frozen-lockfile

    #   - name: Build
    #     run: bun run build

  lint:
    runs-on: ubuntu-latest
    name: Lint
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    # steps:
    #   - name: Checkout repository
    #     uses: actions/checkout@v6

    #   - name: Setup Bun
    #     uses: oven-sh/setup-bun@v2

    #   - name: Install dependencies
    #     run: bun install --frozen-lockfile

    #   - name: Lint & Formatting check
    #     run: bun run lint

    #   - name: Type check
    #     run: bun run check

  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    # steps:
