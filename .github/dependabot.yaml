version: 2
updates:
  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/frontend"
      - "/backend"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"
      prefix-development: "build"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"
